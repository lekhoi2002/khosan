# Workflow đã bị tắt hoàn toàn
disabled: true

name: Update Hugo dependencies

on:
  # Không có trigger nào được kích hoạt
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-mod:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: 'npm'
        cache-dependency-path: '**/package-lock.json'

    # Workflow bị tắt nên không chạy bước cập nhật module
    - name: Skip updating Hugo module dependencies
      run: echo "Workflow is disabled. No module updates will be performed."

    # Không tạo Pull Request
    - name: Skip creating Pull Request
      run: echo "Workflow is disabled. No pull request will be created."
